<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tornelo Display Clean</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --panel: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --line: #d9e1ec;
      --accent: #0f5cc0;
      --ok: #0d8a47;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Space Grotesk", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(900px 500px at 110% -20%, #dbeafe 0%, transparent 60%),
        linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
      min-height: 100vh;
    }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 18px; }
    .head { display: flex; justify-content: space-between; gap: 12px; align-items: center; flex-wrap: wrap; }
    .title { font-size: 32px; font-weight: 700; letter-spacing: 0.3px; }
    .sub { color: var(--muted); font-size: 14px; }
    .controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .btn {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 13px;
      cursor: pointer;
    }
    .btn.primary {
      background: var(--accent);
      border-color: #0d4ea5;
      color: #fff;
      font-weight: 600;
    }
    .meta {
      margin-top: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      color: var(--muted);
      font-size: 13px;
    }
    .meta .ok { color: var(--ok); font-weight: 600; }
    .grid {
      margin-top: 14px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 10px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      box-shadow: 0 8px 20px rgba(10, 25, 49, 0.06);
    }
    .pair {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px dashed #dbe5f2;
    }
    .pair:last-of-type { border-bottom: none; }
    .name { font-size: 16px; font-weight: 600; }
    .color {
      font-size: 11px;
      font-weight: 700;
      border-radius: 999px;
      padding: 3px 8px;
      border: 1px solid #c8d3e3;
      min-width: 56px;
      text-align: center;
    }
    .white { background: #f5f7fb; color: #263247; }
    .black { background: #232a38; color: #fff; border-color: #232a38; }
    .foot { margin-top: 7px; font-size: 12px; color: var(--muted); }
    .empty {
      margin-top: 20px;
      border: 1px dashed var(--line);
      border-radius: 12px;
      padding: 24px;
      text-align: center;
      color: var(--muted);
      background: #fff;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <div>
        <div class="title">Pairings Display</div>
        <div class="sub">Tornelo CSV upload (safe mode). Tables are intentionally hidden.</div>
      </div>
      <div class="controls">
        <input id="csvInput" type="file" accept=".csv,text/csv" style="display:none">
        <button class="btn primary" id="uploadBtn">Upload Tornelo CSV</button>
        <button class="btn" id="clearBtn">Clear</button>
      </div>
    </div>

    <div class="meta" id="meta"></div>
    <div class="grid" id="grid"></div>
    <div class="empty" id="empty" style="display:none">No snapshot loaded yet.</div>
  </div>

  <script>
    const STORE_KEY = 'tornelo_snapshot_safe_v1';
    const MAX_BYTES = 2 * 1024 * 1024;

    function parseCsvLine(line) {
      const cells = [];
      let current = '';
      let inQuotes = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') {
          if (inQuotes && line[i + 1] === '"') {
            current += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (ch === ',' && !inQuotes) {
          cells.push(current.trim());
          current = '';
        } else {
          current += ch;
        }
      }
      cells.push(current.trim());
      return cells;
    }

    function normalizeText(value) {
      const text = String(value || '').replace(/\s+/g, ' ').trim();
      return text.slice(0, 120);
    }

    function parseTorneloCsv(text, fileName) {
      if (text.length > MAX_BYTES) throw new Error('CSV too large');
      const lines = text.split(/\r?\n/).filter(Boolean);
      if (lines.length < 2) throw new Error('CSV is empty');

      const headers = parseCsvLine(lines[0]);
      const idx = name => headers.indexOf(name);
      const whiteIndex = idx('White player');
      const blackIndex = idx('Black player');
      const resultIndex = idx('Result');
      const scoreLeftIndex = idx('Score');
      const scoreRightIndex = headers.lastIndexOf('Score');

      if (whiteIndex < 0 || blackIndex < 0) throw new Error('Missing expected Tornelo columns');

      const pairings = [];
      for (let i = 1; i < lines.length; i++) {
        const row = parseCsvLine(lines[i]);
        const white = normalizeText(row[whiteIndex]);
        const black = normalizeText(row[blackIndex]);
        if (!white || !black) continue;
        pairings.push({
          white,
          black,
          result: normalizeText(resultIndex >= 0 ? row[resultIndex] : '-'),
          scoreLeft: normalizeText(scoreLeftIndex >= 0 ? row[scoreLeftIndex] : ''),
          scoreRight: normalizeText(scoreRightIndex >= 0 ? row[scoreRightIndex] : '')
        });
      }

      const roundMatch = (fileName || '').match(/round[-_\s]*(\d+)/i);
      return {
        source: normalizeText(fileName || 'pairings.csv'),
        round: roundMatch ? `Round ${roundMatch[1]}` : 'Current Round',
        updatedAt: new Date().toISOString(),
        pairings
      };
    }

    function saveSnapshot(snapshot) {
      localStorage.setItem(STORE_KEY, JSON.stringify(snapshot));
    }

    function loadSnapshot() {
      const raw = localStorage.getItem(STORE_KEY);
      if (!raw) return null;
      try { return JSON.parse(raw); } catch (_) { return null; }
    }

    function render(snapshot) {
      const meta = document.getElementById('meta');
      const grid = document.getElementById('grid');
      const empty = document.getElementById('empty');
      meta.innerHTML = '';
      grid.innerHTML = '';

      if (!snapshot || !Array.isArray(snapshot.pairings) || snapshot.pairings.length === 0) {
        empty.style.display = '';
        return;
      }

      empty.style.display = 'none';
      const updated = new Date(snapshot.updatedAt).toLocaleString();
      const m1 = document.createElement('span');
      m1.textContent = snapshot.round;
      const m2 = document.createElement('span');
      m2.textContent = `File: ${snapshot.source}`;
      const m3 = document.createElement('span');
      m3.className = 'ok';
      m3.textContent = `Updated: ${updated}`;
      const m4 = document.createElement('span');
      m4.textContent = `${snapshot.pairings.length} pairings`;
      meta.append(m1, m2, m3, m4);

      snapshot.pairings.forEach((pairing) => {
        const card = document.createElement('div');
        card.className = 'card';

        const p1 = document.createElement('div');
        p1.className = 'pair';
        const n1 = document.createElement('span');
        n1.className = 'name';
        n1.textContent = pairing.white;
        const c1 = document.createElement('span');
        c1.className = 'color white';
        c1.textContent = 'White';
        p1.append(n1, c1);

        const p2 = document.createElement('div');
        p2.className = 'pair';
        const n2 = document.createElement('span');
        n2.className = 'name';
        n2.textContent = pairing.black;
        const c2 = document.createElement('span');
        c2.className = 'color black';
        c2.textContent = 'Black';
        p2.append(n2, c2);

        const foot = document.createElement('div');
        foot.className = 'foot';
        foot.textContent = `Result: ${pairing.result || '-'} | Scores: ${pairing.scoreLeft || '-'} - ${pairing.scoreRight || '-'}`;

        card.append(p1, p2, foot);
        grid.appendChild(card);
      });
    }

    document.getElementById('uploadBtn').addEventListener('click', () => {
      document.getElementById('csvInput').click();
    });

    document.getElementById('csvInput').addEventListener('change', async (event) => {
      const file = event.target.files && event.target.files[0];
      if (!file) return;
      try {
        const text = await file.text();
        const snapshot = parseTorneloCsv(text, file.name);
        saveSnapshot(snapshot);
        render(snapshot);
      } catch (error) {
        alert('Could not parse file: ' + error.message);
      }
      event.target.value = '';
    });

    document.getElementById('clearBtn').addEventListener('click', () => {
      localStorage.removeItem(STORE_KEY);
      render(null);
    });

    render(loadSnapshot());
  </script>
</body>
</html>
