<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Player Card QR</title>
  <style>
    :root {
      --bg: #f4efe6;
      --panel: #fffdf8;
      --ink: #1d1f24;
      --muted: #6f6657;
      --accent: #2c7be5;
      --border: #d9c9ab;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "IBM Plex Sans", "Source Sans 3", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(1000px 500px at 0% -10%, #efe5d3 0%, transparent 60%),
        linear-gradient(180deg, #fbf7ef 0%, #f2eadc 100%);
      display: grid;
      place-items: center;
      padding: 18px;
    }
    .card {
      width: min(560px, 100%);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 14px 30px rgba(40, 30, 10, 0.12);
    }
    .title { font-size: 30px; font-weight: 800; margin-bottom: 4px; }
    .sub { color: var(--muted); font-size: 14px; margin-bottom: 12px; }
    .row { display: flex; gap: 8px; flex-wrap: wrap; }
    input {
      flex: 1;
      min-width: 240px;
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 10px;
      font-size: 14px;
      background: #fff;
      color: var(--ink);
    }
    button {
      border: 1px solid #1f5fad;
      background: var(--accent);
      color: #fff;
      border-radius: 9px;
      padding: 10px 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .qr {
      margin-top: 14px;
      border: 1px dashed var(--border);
      border-radius: 12px;
      display: grid;
      place-items: center;
      min-height: 300px;
      background: #fff;
      padding: 10px;
    }
    .hint { margin-top: 10px; font-size: 13px; color: var(--muted); }
    .link {
      margin-top: 10px;
      font-size: 13px;
      color: #2c4f82;
      word-break: break-all;
      border-top: 1px solid #ece3d2;
      padding-top: 8px;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>
</head>
<body>
  <div class="card">
    <div class="title">Player Card QR</div>
    <div class="sub">Players scan this to open the Tornelo player-card page on their phones.</div>

    <div class="row">
      <input id="urlInput" type="text" placeholder="https://your-host/tornelo-player-card-upload.html">
      <button id="refreshBtn">Refresh QR</button>
    </div>

    <div class="qr">
      <canvas id="qrCanvas" width="280" height="280"></canvas>
      <img id="qrImg" alt="QR code" style="display:none;width:280px;height:280px">
    </div>

    <div class="hint">Host the files on your laptop/server and put your LAN URL here.</div>
    <div class="link" id="urlPreview"></div>
  </div>

  <script>
    const INPUT_KEY = 'tornelo_player_qr_url_v1';

    function guessDefaultUrl() {
      try {
        const base = location.href.replace(/[^/]+$/, '');
        return base + 'tornelo-player-card-upload.html';
      } catch (_) {
        return 'tornelo-player-card-upload.html';
      }
    }

    function renderQr() {
      const input = document.getElementById('urlInput');
      const preview = document.getElementById('urlPreview');
      const canvas = document.getElementById('qrCanvas');
      const img = document.getElementById('qrImg');
      const url = (input.value || '').trim();
      if (!url) return;
      localStorage.setItem(INPUT_KEY, url);
      preview.textContent = url;
      if (window.QRCode && typeof window.QRCode.toCanvas === 'function') {
        img.style.display = 'none';
        canvas.style.display = '';
        QRCode.toCanvas(canvas, url, {
          width: 280,
          margin: 1,
          color: { dark: '#0f172a', light: '#ffffff' }
        }, (err) => {
          if (err) {
            preview.textContent = 'Could not generate QR from library. Using fallback image.';
            canvas.style.display = 'none';
            img.style.display = '';
            img.src = 'https://api.qrserver.com/v1/create-qr-code/?size=280x280&data=' + encodeURIComponent(url);
          }
        });
      } else {
        canvas.style.display = 'none';
        img.style.display = '';
        img.src = 'https://api.qrserver.com/v1/create-qr-code/?size=280x280&data=' + encodeURIComponent(url);
      }
    }

    const input = document.getElementById('urlInput');
    const saved = localStorage.getItem(INPUT_KEY);
    input.value = saved || guessDefaultUrl();

    document.getElementById('refreshBtn').addEventListener('click', renderQr);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') renderQr();
    });

    renderQr();
  </script>
</body>
</html>
